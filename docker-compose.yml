services:
  web:
    build: .
    container_name: django_test
    env_file:
      - .env
    ports:
      - 8000:8000
    volumes:
      - ./DJ-proj:/app_but_where_is_it
    depends_on:
      db:
        condition: service_healthy
        restart: true
  db:
    image: postgres:latest
    container_name: postgres_test
    volumes:
      - postgres_test:/var/lib/postgresql/18/data
    ports:
      - 5435:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    

volumes:
  postgres_test: